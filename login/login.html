<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./login.css">
  <link rel="stylesheet" href="../globals.css">
  <title>Мой кошелек | Войти</title>
</head>

<body>
  <div class="login">
    <h1 class='login__heading'>Web Wallet</h1>
    <form class='login__form' action="">
      <div class="login__form-field">
        <label for="wallet-password">Пароль от кошелька</label>
        <input id='wallet-password' class='login__form-password' placeholder='Пароль' autocomplete='new-password'
          type="password">
      </div>
      <button class='login__submit-button'>Войти</button>
    </form>
  </div>
  <script src='./login.js'></script>
</body>

</html>
