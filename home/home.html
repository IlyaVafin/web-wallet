<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./../globals.css">
  <link rel="stylesheet" href="./home.css">
  <title>Web Wallet | Home</title>
</head>

<body>
  <div class="main-page-wrapper">
    <aside class='sidebar'>
      <h2 class='sidebar__heading'><img width='20' height='20' src='./img/svg/logo.svg' alt='' /> Web Wallet</h2>
      <p class='sidebar__balance'>Баланс: </p>
      <nav class='sidebar__nav'>
        <ul class='sidebar__list'>
          <li class='sidebar__list-item'><a href="">Сменить пароль</a></li>
        </ul>
      </nav>
    </aside>
    <div class="container">
      <div class="forms">
        <div class="form-costs-table-wrapper">
          <form class='income__form card main-form'>
            <h2 class='income__heading'>Доходы</h2>
            <div class="income__form-fields-wrapper">
              <div class="income__form-field income__form-field_title">
                <label class='form-label' for="income-name">Наименование дохода</label>
                <input name='title' id='income-name' class='income__input black-input' type="text">
              </div>
              <div class="income__form-field income__form-field_child income__form-field_size">
                <label class='form-label' for="income-input">
                  Размер дохода
                </label>
                <input name='size' class='income__input black-input numeric-input' id='income-input'
                  placeholder='Введите размер дохода' type='text' />
              </div>
              <div class="income__form-field income__form-field_date">
                <label for="income-date">Дата</label>
                <input name='date' id='income-date' class='income__input field-date' type='date' />
              </div>
            </div>
            <button class='button income__button-submit'>Сохранить</button>
          </form>
          <table class="table">
            <thead>
              <th>Название</th>
              <th>Доход</th>
              <th>Дата</th>
            </thead>
            <tbody class='income-table__body'>
            </tbody>
          </table>
        </div>
        <div class="form-costs-table-wrapper">
          <form class='costs__form card main-form' action="">
            <h2>Расходы</h2>
            <div class="costs__form-field costs__input_title">
              <label class='form-label' for="income-name">Наименование расхода</label>
              <input name='title' id='income-name' class='costs__input black-input ' type="text">
            </div>
            <div class="costs__form-field costs__form-field_child costs__input_size">
              <label class='form-label' for="costs-input">
                Размер расхода
              </label>
              <input name='size' class='costs__input black-input numeric-input ' id='costs-input'
                placeholder='Введите размер дохода' type='text' />
            </div>
            <div class="costs__form-field costs__input_date">
              <label for="costs-date">Дата</label>
              <input name='date' id='costs-date' class='costs__input field-date' type='date' />
            </div>
            <div class="costs__form-field">
              <label for="category-cost">Категория расхода</label>
              <select class='costs__input category-select' name="category" id="category-cost">
                <option value="Развлечения">Развлечения</option>
                <option value="Хобби">Хобби</option>
                <option value="Еда">Еда</option>
                <option value="Транспорт">Транспорт</option>
                <option value="Туризм">Туризм</option>
              </select>
            </div>
            <button class='button costs__button-submit'>Сохранить</button>
          </form>
          <div class="costs__filters">
            <div class="costs__filter-category">
              <label for="category-cost">Категория расхода</label> <br>
              <select class='category-select costs__input_select-filter' name="category" id="category-cost">
                <option value="Все">Все</option>
                <option value="Развлечения">Развлечения</option>
                <option value="Хобби">Хобби</option>
                <option value="Еда">Еда</option>
                <option value="Транспорт">Транспорт</option>
                <option value="Туризм">Туризм</option>
              </select>
            </div>
          </div>
          <table class='table'>
            <thead>
              <th>Наименование</th>
              <th>Расход</th>
              <th>Дата</th>
              <th>Категория</th>
            </thead>
            <tbody class='costs__table-body'></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script type='module' src='./home.js'></script>
</body>

</html>
